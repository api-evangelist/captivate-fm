specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Captivate
providerId: captivate-fm
created: '2026-07-05'
modified: '2026-07-05'
reconciled: true
tags:
- Podcasting
- Podcast Hosting
- Analytics
- Plans
description: >-
  Captivate sells three flat monthly subscription plans, differentiated by the
  monthly download allowance. All features - including the public API, unlimited
  podcasts under one account, unlimited team members, dynamic content insertion,
  analytics, and podcast websites - are available on every plan; only the
  download allowance changes. Every plan is billed in USD (EUR and GBP options
  also offered) and includes a 30-day free trial. Annual billing is discounted
  relative to monthly. There is no separate charge to use the API; API access is
  included with any active subscription.
notes: >-
  Prices confirmed 2026-07-05 from the Captivate Plans & Pricing FAQ. Monthly
  prices are $19 / $49 / $99; annual prices are $204 / $528 / $1,080 (which work
  out to roughly $17 / $44 / $90 per month). Verify current numbers on the
  pricing page, as Captivate periodically adjusts tiers and download allowances.
sources:
- https://www.captivate.fm/pricing
- https://help.captivate.fm/en/articles/4575980-plans-pricing-faq
currency: USD
billingFrequency: Monthly or Annual
freeTrialDays: 30
plans:
