aid: captivate-fm
name: Captivate
review:
  question: Does Captivate expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Captivate's entire documented public API
    surface is request/response REST over HTTPS (base https://api.captivate.fm),
    published as a public Postman collection at docs.captivate.fm. There is no
    server-push transport - no WebSocket (ws:// or wss://) and no Server-Sent
    Events (SSE) - documented on Captivate's API. The analytics ("insights")
    endpoints that use POST (range, compare, web-player) are ordinary
    request/response REST calls whose bodies carry query parameters; they are
    not streaming channels. There is therefore no realtime surface to model.
findings:
  summary: |
    Captivate does not publish a documented public WebSocket API. Captivate is a
    podcast hosting, distribution, and analytics platform. Its public API is a
    self-serve REST API at https://api.captivate.fm, documented as a public
    Postman collection at https://docs.captivate.fm. Access is self-serve: any
    account holder generates a user ID and API token from the API section of
    their Captivate account, then exchanges them at POST /authenticate/token for
    a Bearer token used on all other requests. The API covers Users, Shows
    (including RSS feed URL and artwork), Episodes (list/get/create/update,
    including scheduled episodes), Media (upload/get/list/search), and Analytics
    / insights (overview, averages, all-time totals, month-by-month, arbitrary
    ranges, episode comparison, and web-player). All endpoints are HTTPS REST.
    No WebSocket, SSE, or other server-push transport is documented anywhere in
    Captivate's API documentation as of the review date.
  accessModel: |
    Public and self-serve. Credentials (user ID + API token) are generated by
    the account holder in the Captivate dashboard's API section - no partner
    application, sales contact, or approval step is required. API access is
    included with any active paid subscription (Personal / Professional /
    Business); there is no separate API fee and no published per-call metering.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.captivate.fm
      documented: true
      note: Entire documented API is request/response REST, published as a public Postman collection at docs.captivate.fm.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Captivate's API documentation as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming surface is documented.
  endpointsConfirmedRest:
    - POST   https://api.captivate.fm/authenticate/token
    - GET    https://api.captivate.fm/users/{id}
    - GET    https://api.captivate.fm/users/{id}/shows
    - GET    https://api.captivate.fm/users/{id}/shows/manager
    - GET    https://api.captivate.fm/shows/{id}/
    - PUT    https://api.captivate.fm/shows/{id}
    - POST   https://api.captivate.fm/shows/{id}/artwork
    - GET    https://api.captivate.fm/shows/{id}/feed
    - GET    https://api.captivate.fm/shows/{id}/episodes
    - GET    https://api.captivate.fm/shows/{id}/episodes/scheduled
    - GET    https://api.captivate.fm/episodes/{id}
    - POST   https://api.captivate.fm/episodes
    - PUT    https://api.captivate.fm/episodes/{id}
    - GET    https://api.captivate.fm/media/{id}
    - POST   https://api.captivate.fm/shows/{id}/media
    - GET    https://api.captivate.fm/shows/{id}/media
    - GET    https://api.captivate.fm/shows/{id}/media/search
    - GET    https://api.captivate.fm/insights/{showId}/overview
    - GET    https://api.captivate.fm/insights/{showId}/overview/{episodeId}
    - GET    https://api.captivate.fm/insights/{showId}/averages
    - GET    https://api.captivate.fm/insights/{showId}/total
    - GET    https://api.captivate.fm/insights/{showId}/total/{episodeId}
    - GET    https://api.captivate.fm/insights/{showId}/monthly
    - GET    https://api.captivate.fm/insights/{showId}/monthly/{episodeId}
    - POST   https://api.captivate.fm/insights/{showId}/range
    - POST   https://api.captivate.fm/insights/{showId}/range/{episodeId}
    - POST   https://api.captivate.fm/insights/{showId}/compare
    - POST   https://api.captivate.fm/insights/{showId}/web-player/{episodeId}
sources:
  - url: https://docs.captivate.fm/
    type: APIReference
    note: Public Captivate API Postman documentation; lists all endpoints, auth flow, and request fields. All REST. No WebSocket.
  - url: https://www.captivate.fm/
    type: Website
    note: Product marketing site for the podcast hosting and analytics platform.
  - url: https://help.captivate.fm/en/
    type: SupportDocumentation
    note: Help center; API credentials are generated in the account's API section.
  - url: https://www.captivate.fm/pricing
    type: Plans
    note: Three flat monthly plans (Personal/Professional/Business) differentiated by monthly download allowance.
  - url: https://status.captivate.fm
    type: StatusPage
    note: Platform status page.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket (or any server-push) protocol surface exists. Captivate's
    entire documented public API is request/response REST over HTTPS. No
    AsyncAPI document was created because there is no streaming transport on
    Captivate's own API to model. The apis.yml catalogs the five logical REST
    APIs (Users, Shows, Episodes, Media, Analytics) with a single OpenAPI and
    Postman/Open collection describing the confirmed endpoints.
notes: |
  Response bodies in the OpenAPI are modeled (marked endpointsModeled at the
  schema level): Captivate's public Postman docs confirm every path, method,
  and request field, but do not publish full JSON response schemas, so response
  objects are represented generically and flagged as modeled. All paths,
  methods, request form fields, and JSON request bodies are taken directly from
  the live public Postman collection.
