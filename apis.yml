aid: captivate-fm
url: https://raw.githubusercontent.com/api-evangelist/captivate-fm/refs/heads/main/apis.yml
name: Captivate
kind: company
description: Captivate is a growth-oriented podcast hosting, distribution, and
  analytics platform. Its public REST API at https://api.captivate.fm lets
  developers authenticate a user, read and manage shows and their RSS feeds,
  create and update episodes, upload and search media (audio) files, and pull
  detailed listening analytics (insights) at the podcast and episode level.
  Access is self-serve - any account holder can generate a user ID and API
  token from the API section of their Captivate account and exchange them for a
  Bearer token. The API is documented as a public Postman collection at
  docs.captivate.fm.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Podcasting
- Podcast Hosting
- Episodes
- Media
- Analytics
- RSS
