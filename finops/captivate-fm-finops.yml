description: >-
  FinOps view of Captivate spend. Captivate is billed as a flat monthly (or
  discounted annual) SaaS subscription in one of three tiers - Personal ($19/mo),
  Professional ($49/mo), or Business ($99/mo) - each including a fixed monthly
  download allowance (30,000 / 150,000 / 300,000). There is no metered per-call
  API charge and no separate API fee; the API is included with any active
  subscription. The dominant cost driver is audience size (downloads), which
  determines the tier a podcaster must sit on. This is a predictable,
  subscription-based cost rather than usage-metered cloud spend.
notes: >-
  Prices confirmed 2026-07-05 from Captivate's pricing FAQ; verify current
  numbers on the pricing page. Overage behavior when a plan's download allowance
  is exceeded (upgrade prompt vs. per-download overage) is not precisely
  documented and is left unreconciled.
