meters:
- name: subscription
  description: Flat monthly or annual subscription fee for the chosen plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: downloads
  description: Episode downloads served in the billing month; determines which plan tier is required.
  unit: downloads
  aggregation: sum
  dimensions:
  - account
  - show
principles:
- name: Visibility
  description: Track monthly downloads per account against the plan allowance to anticipate a required tier upgrade.
- name: Allocation
  description: Attribute the single subscription across the multiple shows hosted under one account when charging back to teams.
- name: Optimization
  description: Choose the lowest tier whose download allowance covers audience size; prefer annual billing for the built-in discount.
- name: Accountability
  description: Assign an owner for the Captivate subscription and review downloads-vs-allowance monthly before renewal.
